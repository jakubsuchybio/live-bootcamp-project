services:
  app-service:
    image: biosek/app-service:latest # specify name of image on Docker Hub
    restart: "always" # automatically restart container when server crashes
    environment: # set up environment variables
      AUTH_SERVICE_IP: ${AUTH_SERVICE_IP:-localhost} # Use localhost as the default value
    # No direct port exposure as Nginx will handle external access
    depends_on: # only run app-service after auth-service has started
      auth-service:
        condition: service_started
    networks:
      - web

  auth-service:
    image: biosek/auth-service:latest
    restart: "always" # automatically restart container when server crashes
    # No direct port exposure as Nginx will handle external access
    networks:
      - web

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web
    depends_on:
      - app-service
      - auth-service
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - web

networks:
  web:
    # Network is now managed by Docker Compose
